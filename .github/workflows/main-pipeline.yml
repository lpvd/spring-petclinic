name: Main pipeline

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install semver
        run: pip install semver

      - name: Bump version
        id: bump
        run: |
          VERSION=$(python3 scripts/bump_version.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}

      - name: Build jar
        run: ./mvnw package -DskipTests -B

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push versioned image
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}:${{ steps.bump.outputs.version }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "Pushed: $IMAGE"

  deploy:
    needs: release
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          envs:     AWS_REGION,ECR_REGISTRY,DB_USER,DB_PASSWORD,RDS_HOST
          script: |
            VERSION=${{ needs.release.outputs.version }}
            IMAGE=${{ secrets.ECR_REGISTRY }}:${VERSION}
            APP_URL=${{ vars.APP_PUBLIC_URL }}

            echo "==> Deploying ${VERSION}"

            docker stop petclinic 2>/dev/null || true
            docker rm   petclinic 2>/dev/null || true

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}

            docker pull $IMAGE

            docker run -d \
              --name petclinic \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=mysql \
              -e SPRING_DATASOURCE_URL="jdbc:mysql://${{ secrets.RDS_HOST }}:3306/petclinic?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USER }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              $IMAGE

            echo "==> Done. App running at: http://${APP_URL}"
